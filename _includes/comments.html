    <script>
    
    // Disqus 配置函数
    // Configure Disqus page information
    var disqus_config = function () {
        // 当前页面完整 URL
        // Current page full URL
        this.page.url = "{{ page.url | prepend: site.baseurl | prepend: site.url }}";

        // 当前页面唯一标识（用于区分不同文章）
        // Unique identifier for the page
        this.page.identifier = "{{ page.url }}";
    };

    // Disqus 站点 shortname（在 _config.yml 中配置）
    // Disqus site shortname from config
    var disqus_shortname = '{{ site.comment.disqus }}';
    
    // 加载 Disqus 评论脚本
    // Load Disqus embed script
    (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');

        // 构建 Disqus 脚本地址
        // Build Disqus script URL
        s.src = '//' + disqus_shortname + '.disqus.com/embed.js';

        // 设置时间戳（避免缓存问题）
        // Set timestamp to avoid caching
        s.setAttribute('data-timestamp', +new Date());

        // 将脚本插入页面
        // Append script to document
        (d.head || d.body).appendChild(s);
    })();
    </script>
