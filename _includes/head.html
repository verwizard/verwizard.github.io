<head>
  <!-- 页面头部区域 -->
  <!-- Head section of the webpage -->

  <meta charset="utf-8">
  <!-- 设置字符编码为 UTF-8 -->
  <!-- Set character encoding to UTF-8 -->

  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- 兼容 IE 浏览器，使用最新渲染模式 -->
  <!-- Force IE to use the latest rendering engine -->

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <!-- 响应式设计，适配移动设备 -->
  <!-- Responsive design for mobile devices -->

  <title>
    {% if page.title %}
      {{ page.title | escape }}
    {% else %}
      {{ site.title | escape }}
    {% endif %}
  </title>
  <!-- 页面标题：优先使用文章标题，否则使用站点标题 -->
  <!-- Page title: use page title if exists, otherwise site title -->

  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <!-- 页面描述（SEO）：优先使用文章摘要，否则使用站点描述 -->
  <!-- Page description (SEO): use excerpt if exists, otherwise site description -->

  <meta name="author" content="Wei Wang">
  <!-- 作者信息 -->
  <!-- Author information -->

  <!-- Twitter 卡片信息 -->
  <!-- Twitter card metadata -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <!-- Open Graph（用于社交媒体分享，如 Facebook） -->
  <!-- Open Graph metadata for social sharing -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <!-- 网站 favicon 图标 -->
  <!-- Website favicon -->
  <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
  <link href="/assets/images/favicon.png" rel="shortcut icon" type="image/png">

  <!-- 主样式文件 -->
  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">

  <!-- Font Awesome 图标库 -->
  <!-- Font Awesome icon library -->
  <link href="//netdna.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">

  <!-- 规范链接（避免 SEO 重复内容问题） -->
  <!-- Canonical URL to avoid duplicate content issues -->
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

  <!-- RSS 订阅链接 -->
  <!-- RSS feed link -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}">

  <!-- Google Search Console 验证 -->
  <!-- Google site verification -->
  <meta name="google-site-verification" content="1-1ZlHoRvM0T2FqPbW2S-qLgYXN6rsn52kErlMPd_gw" />

</head>
